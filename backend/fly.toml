app = "ai-caddie-api"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 0
  processes = ["app"]

[env]
  SECURE_COOKIES = "1"
  # Required when the UI is on a different site than this API (e.g. Vercel + Fly).
  SESSION_COOKIE_SAMESITE = "none"
  # Production: set your real Vercel origin (overrides this), e.g.
  #   fly secrets set CORS_ALLOW_ORIGINS="https://your-app.vercel.app"
  CORS_ALLOW_ORIGINS = "http://localhost:3000"

# NOTE: Set DATABASE_URL and ANTHROPIC_API_KEY as secrets:
#   fly secrets set DATABASE_URL="postgresql://..." ANTHROPIC_API_KEY="..."

